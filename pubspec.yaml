publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  mobile_scanner: ^6.0.0
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  intl: ^0.19.0
  share_plus: ^10.0.0
  pdf: ^3.11.1
